# Emotion Photo Booth - 설정 파일
# 모든 튜닝 값은 여기서 관리한다 (코드 하드코딩 금지)

camera:
  index: 1            # 카메라 장치 인덱스 (0=Mirametrix 가상카메라, 1=실제 LGE 웹캠)
  width: 1280         # 캡처 해상도 가로
  height: 720         # 캡처 해상도 세로
  fps: 30             # 목표 프레임레이트
  warmup_frames: 5    # 노출 안정화를 위해 버릴 초기 프레임 수

capture:
  prepare_seconds: 5     # 촬영 화면 진입 후 "자세를 잡아주세요!" 준비 시간
  countdown_seconds: 3   # 3-2-1 카운트다운 시작 값

output:
  dir: output       # 결과 이미지 저장 폴더
  format: png       # 저장 포맷 (png | jpg)

frames:
  dir: assets/frames  # 감정별 프레임 이미지 폴더

analysis:
  # 검출 백엔드: mtcnn — 딥러닝 기반, 다중 얼굴/각진 얼굴에 강하고 CPU에서 ~1-2초.
  # (opencv는 빠르나 정면만 잘 잡고 다중 얼굴을 자주 놓침, retinaface는 CPU ~25초로 느림)
  detector_backend: mtcnn
  min_face_confidence: 0.7        # 이 값 미만 검출은 무시
  rel_size_ratio: 0.35            # 가장 큰 얼굴 대비 이 비율 미만은 무시 (배경 얼굴 제거, 최대 얼굴은 항상 유지)
  min_face_area_pct: 0.8          # 절대 하한: 이미지 대비 이 % 미만은 무시 (최대 얼굴 제외, 순수 노이즈 제거)
  dedup_iou: 0.4                  # 이 값 이상 겹치는 박스는 중복으로 보고 통합
  emotion_frames: 5               # 감정 안정화: 셔터 순간 이 수만큼 프레임을 투표 (1이면 단일)
  neutral_bias: 0.2               # neutral 점수 가중치 (<1이면 무표정 억제 -> 표정 더 잘 살림)

compose:
  output_size: [1800, 1200]      # 결과 캔버스 px (6x4 inch @ 300dpi, 가로형)
  border: 48                     # 프레임 테두리 두께(px)
  draw_face_labels: true         # 얼굴별 감정 라벨 표시 여부
  font: "C:/Windows/Fonts/malgun.ttf"  # 한글 지원 폰트 (맑은 고딕)

pipeline:
  countdown: 3                   # 촬영 전 카운트다운 초

kiosk:
  idle_timeout_ms: 60000       # 무입력 시 대기 화면 복귀까지 (60초)
  hide_cursor: true            # 마우스 커서 숨김
  prevent_sleep: true          # Windows 절전/화면보호기 방지
  stay_on_top: true            # 항상 위 (최소화/창 이동 방지)
  admin_shortcut: "Ctrl+Shift+Q"  # 종료 단축키 (참고용, 코드에 하드코딩)
  auto_reset_on_error: true    # 에러 시 자동으로 대기 화면 복귀
  error_display_seconds: 3     # 에러 메시지 표시 시간

retry:
  camera_max_attempts: 3       # 카메라 시작 재시도 횟수
  camera_retry_delay_ms: 1000  # 재시도 간격
  analysis_max_attempts: 2     # 분석 재시도 횟수

logging:
  level: INFO             # DEBUG | INFO | WARNING | ERROR
  file: logs/photobooth.log
