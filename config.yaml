# Emotion Photo Booth - 설정 파일
# 모든 튜닝 값은 여기서 관리한다 (코드 하드코딩 금지)

camera:
  index: 1            # 카메라 장치 인덱스 (0=Mirametrix 가상카메라, 1=실제 LGE 웹캠)
  width: 1280         # 캡처 해상도 가로
  height: 720         # 캡처 해상도 세로
  fps: 30             # 목표 프레임레이트
  warmup_frames: 5    # 노출 안정화를 위해 버릴 초기 프레임 수

capture:
  prepare_seconds: 5     # 촬영 화면 진입 후 "자세를 잡아주세요!" 준비 시간
  countdown_seconds: 3   # 3-2-1 카운트다운 시작 값

output:
  dir: output       # 결과 이미지 저장 폴더
  format: png       # 저장 포맷 (png | jpg)

frames:
  dir: assets/frames  # 감정별 프레임 이미지 폴더

analysis:
  detector_backend: retinaface  # DeepFace 얼굴 검출 백엔드
  min_face_confidence: 0.9       # 이 값 미만 검출은 무시 (오검출 제거)

compose:
  output_size: [1800, 1200]      # 결과 캔버스 px (6x4 inch @ 300dpi, 가로형)
  border: 48                     # 프레임 테두리 두께(px)
  draw_face_labels: true         # 얼굴별 감정 라벨 표시 여부
  font: "C:/Windows/Fonts/malgun.ttf"  # 한글 지원 폰트 (맑은 고딕)

pipeline:
  countdown: 3                   # 촬영 전 카운트다운 초

logging:
  level: INFO             # DEBUG | INFO | WARNING | ERROR
  file: logs/photobooth.log
